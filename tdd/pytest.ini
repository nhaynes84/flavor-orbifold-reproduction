[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    data: Data validation — verifies reference values are correct (should all be green)
    framework: Framework predictions — calls boundary/loeschian functions and checks against measurement (the real scorecard)
    two_category: Two-category framework tests (coherence vs eigenvalue split)
    decoherence: Decoherence spectrum tests (gamma rates, transmission, confinement)
    slow: marks tests as slow (deselect with '-m "not slow"')
addopts = -v --tb=short
